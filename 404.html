<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        // SPA fallback: a /blog/<slug> published after the last deploy has no
        // prerendered file yet — bounce to the app via the ?p= convention
        // that index.html's redirect handler already understands.
        (function () {
            var p = location.pathname;
            if (/^\/blog\/.+/.test(p)) {
                location.replace("/?p=" + p);
            }
        })();
    </script>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in Space | K Laxman Portfolio</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            box-sizing: border-box;
        }

        .astro {
            font-size: 90px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            color: #fff;
            font-size: 28px;
            margin: 16px 0 8px;
        }

        p {
            max-width: 420px;
            margin: 0 0 24px;
            color: #8b949e;
        }

        a {
            color: #0a0a0a;
            background: #00d4a0;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg)
            }

            50% {
                transform: translateY(-14px) rotate(5deg)
            }
        }
    </style>
    <script type="text/javascript">
        // GitHub Pages SPA redirect: converts /projects -> /?p=/projects
        // which index.html turns back into /projects instantly. Users with
        // JS enabled never see this page; the content below is the fallback.
        (function (l) {
            var segmentCount = 0;
            l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
                l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
                (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
            );
        }(window.location));
    </script>
</head>

<body>
    <div class="astro">👨‍🚀</div>
    <h1>404 — You drifted off course</h1>
    <p>This page doesn't exist in this galaxy. But the portfolio of K Laxman
        definitely does — let me beam you back.</p>
    <a href="/">🚀 Take me home</a>
</body>

</html>
